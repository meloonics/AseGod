[plugin]

name="AseGod"
description="Bidirectional Aseprite-Godot Pipeline. Can create Aseprite files from GDScript and parse any Aseprite file into Godot-familiar Resources with full support for Tags, any user data and per-cell color information. Export-Ticket system that allows you to extend and customize your Aseprite imports with per-object-precision. That way you can adjust your files exactly to your project's needs without having to touch the complexity of en- and decoding either format into the other and back. \n\n\
	This was a quick project for the cruscord jam 2, a 4-week creative jam, that i was 3 weeks late for. therefore it may not be as production-ready as already existing Aseprite importers for Godot. \
	Future versions could have included user-data-infused commands that allow you to preconfigure your imports on Aseprite's end and interpret cels as any sort of data you want (collision, navigation, occlusion etc.). But then I sadly abandoned this project, sadly. So sad. Are you crying? I'm crying." 
author="meloonics"
version="1.0.0"
script="plugin.gd"
